<!DOCTYPE html>
<html>
<head>
    <title>DEQ Interactive Dashboard</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <style>
        /* UNIVERSITY OF UTAH BRANDING COLORS */
        :root {
            --utah-red: #CC0000;
            --utah-black: #000000;
            --utah-grey: #f4f4f9;
            --dark-grey: #333333;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--utah-grey); margin: 0; padding: 20px; color: var(--utah-black); }
        .dashboard-container { max-width: 1400px; margin: auto; }
        
        /* Updated Header with Logo Container */
        .header { background: var(--utah-grey); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .header-content { display: flex; align-items: center; justify-content: space-between; }
        
        .logo-container { 
            width: 180px; 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
        }
        .logo-container img {
            max-height: 60px; 
            width: auto;      
            object-fit: contain; 
        }

        .header-text { text-align: center; flex-grow: 1; color:var(--utah-red) }
        .header-spacer { width: 180px; } 

        /* Control Panel Styling */
        .controls { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; gap: 20px; align-items: center; flex-wrap: wrap; border-top: 4px solid var(--dark-grey); }
        .control-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
        select { padding: 10px; font-size: 15px; border-radius: 4px; border: 1px solid #ccc; width: 100%; background: #fff; }
        label { font-weight: bold; color: var(--dark-grey); font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Grid Layout */
        .grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); min-height: 400px; position: relative; }
        
        /* Metrics Styling */
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .metric-box { text-align: center; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .metric-val { font-size: 1.8em; font-weight: bold; color: var(--utah-black); }
        .metric-lbl { color: #666; font-size: 0.85em; letter-spacing: 0.5px; margin-top: 5px; }
        
        /* Accent Colors */
        .border-red { border-top: 4px solid var(--utah-red); }
        .text-red { color: var(--utah-red); }

        /* Loading Text Styling */
        .loading-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #bdc3c7; font-size: 1.2em; pointer-events: none; }

        /* Footer */
        .footer { text-align: center; padding: 20px; color: #7f8c8d; font-size: 0.9em; margin-top: 20px; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            .header-content { flex-direction: column; gap: 15px; text-align: center; }
            .header-spacer { display: none; }
            .controls { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="header">
        <div class="header-content">
            <div class="logo-container">
                <img src="U-CREW.png" alt="U-CREW Logo">
            </div>
            <div class="header-text">
                <h1 style="margin:0;">BERP Interactive Dashboard</h1>
                <p style="margin:5px 0 0 0;">Real-time Impact Tracking & Visualization</p>
            </div>
            <div class="header-spacer"></div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Fiscal Year:</label>
            <select id="yearFilter" onchange="updateDashboard()">
                <option value="All">All Years</option>
            </select>
        </div>

        <div class="control-group">
            <label>Implementation Status:</label>
            <select id="statusFilter" onchange="updateDashboard()">
                <option value="All">All Projects</option>
                <option value="Identified">Identified</option>
                <option value="Implemented">Implemented</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>County:</label>
            <select id="countyFilter" onchange="updateDashboard()">
                <option value="All">All Counties</option>
            </select>
        </div>

        <div class="control-group">
            <label style="color: var(--utah-red);">Map Metric:</label>
            <select id="metricFilter" onchange="updateDashboard()">
                <option value="Total_CO2_Tons">CO2 Reduced (Tons)</option>
                <option value="Total_NOx_lb">NOx Reduced (lbs)</option>
                <option value="Total Cost Savings">Cost Savings ($)</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3 id="mapTitle" style="margin-top:0; color: var(--utah-black);">Utah Impact Map</h3>
            <div id="utahMap" style="height: 500px;">
                <div class="loading-text">Loading Map...</div>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-top:0; color: var(--utah-black);">Program Metrics</h3>
            <div id="metricsBox"><div class="loading-text">Loading Data...</div></div>
        </div>
    </div>

    <div class="footer">
        Data Last Updated: <span id="lastUpdatedDate">Checking...</span>
    </div>
</div>

<script>
    let globalData = [];
    const geoJsonUrl = "https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json"; 

    fetch('site_data.json')
        .then(response => {
            let lastMod = response.headers.get('Last-Modified');
            if(lastMod) {
                document.getElementById('lastUpdatedDate').innerText = new Date(lastMod).toLocaleString();
            } else {
                document.getElementById('lastUpdatedDate').innerText = new Date().toLocaleDateString();
            }
            return response.json();
        })
        .then(data => {
            globalData = data;
            populateFilters();
            updateDashboard();
        })
        .catch(error => console.error("Error loading data:", error));

    function populateFilters() {
        let years = [...new Set(globalData.map(d => d.Year))].filter(y => y > 0).sort((a,b) => b-a);
        let yearSel = document.getElementById('yearFilter');
        years.forEach(y => {
            let opt = document.createElement('option');
            opt.value = y; opt.innerHTML = y; yearSel.appendChild(opt);
        });

        let counties = [...new Set(globalData.map(d => d.County))].filter(Boolean).sort();
        let countySel = document.getElementById('countyFilter');
        counties.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c; opt.innerHTML = c; countySel.appendChild(opt);
        });
    }

    function updateDashboard() {
        let yearSel = document.getElementById('yearFilter').value;
        let statusSel = document.getElementById('statusFilter').value;
        let countySel = document.getElementById('countyFilter').value;
        let metricSel = document.getElementById('metricFilter').value; 

        let filtered = globalData.filter(d => {
            let yearMatch = (yearSel === "All") || (d.Year == yearSel);
            let statusMatch = (statusSel === "All") || (d['Implemented? Yes/No/In Progress'] === statusSel);
            let countyMatch = (countySel === "All") || (d.County === countySel);
            return yearMatch && statusMatch && countyMatch;
        });

        renderMap(filtered, metricSel);
        renderMetrics(filtered);
    }

    // --- RENDER METRICS ---
    function renderMetrics(data) {
        let uniqueReports = new Set(data.map(d => d['Report Number']));
        let assessmentCount = uniqueReports.size;
        let recommendationCount = data.length;

        // Raw calculations
        let totalCO2 = d3.sum(data, d => d.Total_CO2_Tons);
        let totalSavings = d3.sum(data, d => d['Total Cost Savings']);
        let totalNOx = d3.sum(data, d => d.Total_NOx_lb);

        // ROUNDING MATH: Divide by 100, round, multiply by 100
        let roundedCO2 = Math.round(totalCO2 / 100) * 100;
        let roundedNOx = Math.round(totalNOx / 100) * 100;

        document.getElementById('metricsBox').innerHTML = `
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="metric-val">${assessmentCount}</div>
                    <div class="metric-lbl">Assessments</div>
                </div>
                <div class="metric-box">
                    <div class="metric-val">${recommendationCount}</div>
                    <div class="metric-lbl">Recommendations</div>
                </div>
            </div>

            <div class="metric-box border-red" style="margin-bottom:15px; padding: 25px;">
                <div class="metric-val text-red" style="font-size: 2.5em;">$${d3.format(",.0f")(totalSavings)}</div>
                <div class="metric-lbl">Annual Cost Savings</div>
            </div>

            <div style="display:flex; gap:15px;">
                <div class="metric-box" style="flex:1;">
                    <div class="metric-val">${d3.format(",.0f")(roundedCO2)}</div>
                    <div class="metric-lbl">Tons CO2</div>
                </div>
                <div class="metric-box" style="flex:1;">
                    <div class="metric-val">${d3.format(",.0f")(roundedNOx)}</div>
                    <div class="metric-lbl">lbs NOx</div>
                </div>
            </div>
        `;
    }

    // --- RENDER MAP ---
    function renderMap(data, metric) {
        document.getElementById('utahMap').innerHTML = '';

        let metricLabels = {
            'Total_CO2_Tons': 'Tons CO2',
            'Total_NOx_lb': 'lbs NOx',
            'Total Cost Savings': 'Savings ($)'
        };
        let label = metricLabels[metric] || 'Value';

        document.getElementById('mapTitle').innerText = `Utah Impact: ${label}`;

        let fipsMap = d3.rollup(data, v => d3.sum(v, d => d[metric]), d => d.FIPS);
        let locations = Array.from(fipsMap.keys());
        let zValues = Array.from(fipsMap.values());
        
        let hoverText = locations.map(fips => {
            let match = data.find(d => d.FIPS === fips);
            let val = fipsMap.get(fips);
            
            // Round Map hover values to the nearest 100 if it's CO2 or NOx
            if (metric === 'Total_CO2_Tons' || metric === 'Total_NOx_lb') {
                val = Math.round(val / 100) * 100;
            }

            // Using ",.0f" to ensure commas and no decimal places
            return match ? `${match.County}: ${d3.format(",.0f")(val)} ${label}` : fips;
        });

        let allUtahFips = ["49001", "49003", "49005", "49007", "49009", "49011", "49013", "49015", "49017", "49019", "49021", "49023", "49025", "49027", "49029", "49031", "49033", "49035", "49037", "49039", "49041", "49043", "49045", "49047", "49049", "49051", "49053", "49055", "49057"];
        
        let backgroundTrace = {
            type: 'choropleth', geojson: geoJsonUrl, locations: allUtahFips, 
            z: Array(allUtahFips.length).fill(0), colorscale: [['0.0', '#e0e0e0'], ['1.0', '#e0e0e0']], 
            showscale: false, marker: { line: { width: 0.5, color: '#ffffff' } }, hoverinfo: 'skip'
        };

        let dataTrace = {
            type: 'choropleth', geojson: geoJsonUrl, locations: locations, z: zValues, text: hoverText,
            colorscale: 'Reds', marker: { line: { width: 1, color: '#333' } }, 
            colorbar: { title: label },
            hovertemplate: '<b>%{text}</b><extra></extra>' 
        };

        let layout = {
            margin: {l:0, r:0, t:0, b:0}, 
            geo: {
                projection: { type: 'mercator' },
                showlakes: false,
                showframe: false, showcoastlines: false,
                center: { lon: -111.5, lat: 39.4 }, 
                lonaxis: { range: [-114.5, -108.5] }, 
                lataxis: { range: [36.5, 42.5] }
            },
            dragmode: false
        };

        Plotly.newPlot('utahMap', [backgroundTrace, dataTrace], layout, {responsive: true});
    }
</script>

</body>
</html>
